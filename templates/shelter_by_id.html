{{ define "head" }}
	<title>{{ .Shelter.Name }} - Amponin</title>

	<link rel="stylesheet" href="/public/styles/pages/shelter-by-id.css">
	<script src="/public/scripts/notification-bar.js" defer></script>
{{ end }}

{{ define "content" }}
	<main class="container shelter-profile">
		<div class="shelter-profile__info-wrapper">
			<div class="shelter-profile__heading">
				<div class="shelter-profile__avatar">
					<img src="{{ with .Shelter.AvatarURL -}} {{ . }} {{- else -}} /public/default-avatar-shelter.png {{- end }}" alt="{{ .Shelter.Name }}'s Avatar">	 
				</div>
				<h1 class="shelter-profile__name">{{ .Shelter.Name }}</h1>
			</div>
			<div class="shelter-profile__info-item">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="shelter-profile__info-item-icon">
					<path fill-rule="evenodd" d="m9.69 18.933.003.001C9.89 19.02 10 19 10 19s.11.02.308-.066l.002-.001.006-.003.018-.008a5.741 5.741 0 0 0 .281-.14c.186-.096.446-.24.757-.433.62-.384 1.445-.966 2.274-1.765C15.302 14.988 17 12.493 17 9A7 7 0 1 0 3 9c0 3.492 1.698 5.988 3.355 7.584a13.731 13.731 0 0 0 2.273 1.765 11.842 11.842 0 0 0 .976.544l.062.029.018.008.006.003ZM10 11.25a2.25 2.25 0 1 0 0-4.5 2.25 2.25 0 0 0 0 4.5Z" clip-rule="evenodd" />
				</svg>
				<a
					href="https://www.google.com/maps/search/?api=1&query={{ .Shelter.Coordinates.Latitude }},{{ .Shelter.Coordinates.Longitude }}&zoom=15"
					target="_blank"
					class="shelter-profile__address"
				>{{ .Shelter.Address }}</a>
			</div>	
			{{ if .Role }}
				<div class="shelter-profile__controls">
					<a
						href="/shelter/{{ .Shelter.ID }}/settings"
						class="button button--outline button--with-icon"
					>
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="button__icon">
							<path fill-rule="evenodd" d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.113a7.047 7.047 0 0 1 0 2.228l1.267 1.113a1 1 0 0 1 .206 1.25l-1.18 2.045a1 1 0 0 1-1.187.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.05 7.05 0 0 1 0-2.227L1.821 7.773a1 1 0 0 1-.206-1.25l1.18-2.045a1 1 0 0 1 1.187-.447l1.598.54A6.992 6.992 0 0 1 7.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd" />
						</svg>
						<span>Settings</span>
					</a>
					<a class="button button--with-icon" href="/shelter/{{ .Shelter.ID }}/post-pet">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="button__icon">
							<path d="m5.433 13.917 1.262-3.155A4 4 0 0 1 7.58 9.42l6.92-6.918a2.121 2.121 0 0 1 3 3l-6.92 6.918c-.383.383-.84.685-1.343.886l-3.154 1.262a.5.5 0 0 1-.65-.65Z" />
							<path d="M3.5 5.75c0-.69.56-1.25 1.25-1.25H10A.75.75 0 0 0 10 3H4.75A2.75 2.75 0 0 0 2 5.75v9.5A2.75 2.75 0 0 0 4.75 18h9.5A2.75 2.75 0 0 0 17 15.25V10a.75.75 0 0 0-1.5 0v5.25c0 .69-.56 1.25-1.25 1.25h-9.5c-.69 0-1.25-.56-1.25-1.25v-9.5Z" />
						</svg>
						<span>Post Pet</span>
					</a>
				</div>
			{{ end }}
		</div>
		<p class="shelter-profile__description">{{ .Shelter.Description }}</p>
	</main>
{{ end }}
