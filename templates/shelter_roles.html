{{ define "head" }}
	<title>Shelter Roles - Amponin</title>
	<link rel="stylesheet" href="/public/styles/pages/shelter-roles.css">
{{ end }}

{{ define "content" }}
<main>
	<div class="card container-xs">
		<hgroup class="card__hgroup">
			<h1 class="card__heading">Shelter Roles</h1>
			<p class="card__subheading">{{ .ShelterName }}</p>
		</hgroup>
		{{ with .Flash }}
			<div class="card__flash
				{{- if eq .Level `flash_error` }} card__flash--error
				{{- else if eq .Level `flash_warn` }} card__flash--warn
				{{- else if eq .Level `flash_success` }} card__flash--success
				{{- end -}}
			">
				{{ .Message }}					
			</div>
		{{ end }}
		<div class="role-list">
			{{ range .ShelterRoles }}
				<div class="role-item">
					<p class="role-item__role">{{ .Role }}</p>
					<div class="role-item__details">
						<h1 class="role-item__name">{{ .DisplayName }}</h1>
						<p class="role-item__email">{{ .Email }}</p>
					</div>
					<div class="role-item__actions">
						<a href="#" class="role-item__action role-item__action--edit">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
								<path d="m5.433 13.917 1.262-3.155A4 4 0 0 1 7.58 9.42l6.92-6.918a2.121 2.121 0 0 1 3 3l-6.92 6.918c-.383.383-.84.685-1.343.886l-3.154 1.262a.5.5 0 0 1-.65-.65Z" />
								<path d="M3.5 5.75c0-.69.56-1.25 1.25-1.25H10A.75.75 0 0 0 10 3H4.75A2.75 2.75 0 0 0 2 5.75v9.5A2.75 2.75 0 0 0 4.75 18h9.5A2.75 2.75 0 0 0 17 15.25V10a.75.75 0 0 0-1.5 0v5.25c0 .69-.56 1.25-1.25 1.25h-9.5c-.69 0-1.25-.56-1.25-1.25v-9.5Z" />
							</svg>
						</a>		
						<a href="/shelter/{{ $.ShelterID }}/roles/remove?email={{.Email}}" class="role-item__action role-item__action--remove">
							<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
								<path d="M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM2.046 15.253c-.058.468.172.92.57 1.175A9.953 9.953 0 0 0 8 18c1.982 0 3.83-.578 5.384-1.573.398-.254.628-.707.57-1.175a6.001 6.001 0 0 0-11.908 0ZM12.75 7.75a.75.75 0 0 0 0 1.5h5.5a.75.75 0 0 0 0-1.5h-5.5Z" />
							</svg>
						</a>
					</div>
				</div>
			{{ end }}
			<a
				href="/shelter/{{ .ShelterID }}/roles/add"
				class="button button--with-icon"
			>
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="button__icon">
					<path d="M10 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0ZM1.615 16.428a1.224 1.224 0 0 1-.569-1.175 6.002 6.002 0 0 1 11.908 0c.058.467-.172.92-.57 1.174A9.953 9.953 0 0 1 7 18a9.953 9.953 0 0 1-5.385-1.572ZM16.25 5.75a.75.75 0 0 0-1.5 0v2h-2a.75.75 0 0 0 0 1.5h2v2a.75.75 0 0 0 1.5 0v-2h2a.75.75 0 0 0 0-1.5h-2v-2Z" />
				</svg>
				<span>Add Role</span>
			</a>
		</div>
	</div>
</main>
{{ end }}
