{{ define "head" }}
	<title>Amponin - Register Shelter</title>

	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
		crossorigin=""/>
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
		integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
		crossorigin="" defer></script>
	<script src="/public/scripts/components/location-input.js" defer></script>
{{ end }}

{{ define "content" }}
<main class="container">
	<hgroup class="with-sidebar | items-center">
		<h1 class="not-sidebar" style="min-width: 60%;">Managed Shelter</h1>
		<a href="/shelter/registration" class="button button--with-icon sidebar" style="--width: auto;">
			<svg class="button__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
				<path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm.75-11.25a.75.75 0 0 0-1.5 0v2.5h-2.5a.75.75 0 0 0 0 1.5h2.5v2.5a.75.75 0 0 0 1.5 0v-2.5h2.5a.75.75 0 0 0 0-1.5h-2.5v-2.5Z" clip-rule="evenodd" />
			</svg>
			Register Shelter
		</a>
	</hgroup>
	<div>
		{{ range .ManagedShelter }}
			<div>
				<pre>{{ . }}</pre>
			</div>
		{{ else }}
			<div class="uppercase">No shelter was found.</div>
		{{ end }}
	</div>
</main>
{{ end }}
